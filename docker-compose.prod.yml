services:
  postgres:
    image: postgres:16
    container_name: crm-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-bot-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "--filter", "@crm-bot/web", "run", "start"]
    ports:
      - "80:3001"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-bot-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    command: ["pnpm", "--filter", "@crm-bot/bot", "run", "start"]

volumes:
  postgres_data:
